<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <title>متجر الأحقاف 🇾🇪</title>
    <style>
        :root { --main-color: #5E0B15; --gold-color: #D4AF37; --light-gold: #FFD700; --sport-color: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; padding-bottom: 120px; }
        
        .header { background: linear-gradient(135deg, var(--main-color), #3e070e); color: var(--light-gold); padding: 20px 10px; text-align: center; border-bottom: 4px solid var(--gold-color); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-family: 'Amiri', serif; font-size: 35px; margin: 0; display: block; }
        .tagline { font-size: 13px; color: var(--light-gold); opacity: 0.9; margin-top: 5px; }
        
        .category-nav { background: white; padding: 10px; display: flex; justify-content: center; gap: 8px; overflow-x: auto; border-bottom: 1px solid #ddd; position: sticky; top: 98px; z-index: 999; }
        .cat-btn { background: #fdf2f2; border: 1px solid var(--main-color); color: var(--main-color); padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .cat-btn.active { background: var(--main-color); color: var(--light-gold); }
        .cat-btn-sport.active { background: var(--sport-color) !important; color: white; border-color: var(--sport-color); }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .product-desc { font-size: 11px; color: #777; margin: 5px 0; background: #f9f9f9; padding: 3px; border-radius: 4px; }
        .price { color: var(--main-color); font-weight: bold; font-size: 17px; margin: 8px 0; }
        .btn-add { background: var(--main-color); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .cart-container { position: fixed; bottom: 0; width: 100%; background: white; border-top: 3px solid var(--gold-color); box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 2000; padding: 10px; display: none; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
        
        .checkout-form { background: #fdf2f2; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; }
        .checkout-form label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--main-color); }
        .checkout-form input, .checkout-form select { width: 96%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }

        .final-price { font-size: 22px; font-weight: bold; color: var(--main-color); text-align: center; margin: 10px 0; }
        .btn-send { background: #25D366; color: white; border: none; padding: 15px; border-radius: 35px; font-weight: bold; cursor: pointer; width: 100%; font-size: 17px; }

        #loading { text-align: center; padding: 50px; font-weight: bold; color: var(--main-color); }
        #toast { visibility: hidden; background: #333; color: #fff; text-align: center; border-radius: 30px; padding: 10px 20px; position: fixed; z-index: 3000; left: 50%; transform: translateX(-50%); bottom: 150px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    </style>
</head>
<body>

<div id="toast">تمت الإضافة للسلة 🛒</div>

<div class="header">
    <h1 class="logo-text">متجر الأحقاف</h1>
    <div class="tagline">الفخامة والجودة بين يديك 🇾🇪</div>
</div>

<div class="category-nav" id="cat-nav">
    <button class="cat-btn active" onclick="filterProducts('الكل', this)">الكل</button>
</div>

<div id="loading">جاري تحميل البضاعة من المخزن... 🔄</div>
<div class="products-grid" id="products-container"></div>

<div class="cart-container" id="cart-box">
    <h3 style="text-align: center; margin: 0 0 15px 0; color: var(--main-color);">مراجعة وتأكيد الطلب 📝</h3>
    <div id="cart-list" style="margin-bottom: 15px;"></div>
    <div class="checkout-form">
        <label>الاسم الكامل:</label>
        <input type="text" id="cust-name" placeholder="أدخل اسمك هنا">
        <label>العنوان (المنطقة والشارع):</label>
        <input type="text" id="cust-address" placeholder="مثال: المكلا - فوه - خلف...">
        <label>طريقة التوصيل:</label>
        <select id="delivery-type" onchange="updateCartUI()">
            <option value="0">استلام من المحل (مجاناً)</option>
            <option value="1000">توصيل داخل المدينة (1,000 ر.ي)</option>
            <option value="3000">توصيل خارج المدينة (3,000 ر.ي)</option>
        </select>
        <label>طريقة الدفع:</label>
        <select id="payment-method">
            <option value="الدفع عند الاستلام">الدفع عند الاستلام</option>
            <option value="تحويل عبر الكريمي">تحويل عبر الكريمي</option>
            <option value="تحويل عبر النجم/الامتياز">تحويل عبر النجم/الامتياز</option>
        </select>
    </div>
    <div class="final-price">الإجمالي النهائي: <span id="cart-total">0</span> ر.ي</div>
    <button class="btn-send" onclick="sendOrder()">إرسال الطلب عبر واتساب 💬</button>
    <div style="text-align:center; margin-top:10px;">
        <button style="background:none; border:none; color:gray; cursor:pointer; text-decoration:underline;" onclick="closeCart()">تعديل السلة</button>
    </div>
</div>

<script>
    // الرابط السحري الخاص بك
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHC7riu2zON61mN-dYSfUanReM2Z8dvRDIzWcCIIExj5EHSp7Z-Nnnu8IW14EX7pXEkzChZjkabMTx/pub?output=csv";

    let allProducts = [];
    let cart = [];

    async function loadProducts() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // تجاهل العناوين
            
            allProducts = rows.map(row => {
                const columns = row.split(',');
                if (columns.length < 5) return null;
                return {
                    id: columns[0].trim(),
                    name: columns[1].trim(),
                    price: parseInt(columns[2].trim()),
                    image: columns[3].trim(),
                    cat: columns[4].trim(),
                    desc: columns[5] ? columns[5].trim() : ""
                };
            }).filter(p => p !== null);

            document.getElementById('loading').style.display = 'none';
            createCategoryButtons();
            displayProducts();
        } catch (error) {
            document.getElementById('loading').innerText = "حدث خطأ في تحميل البيانات. تأكد من إعدادات النشر في جوجل شيت.";
        }
    }

    function createCategoryButtons() {
        const nav = document.getElementById('cat-nav');
        const categories = [...new Set(allProducts.map(p => p.cat))];
        categories.forEach(cat => {
            let cls = (cat === 'ملابس رياضية') ? 'cat-btn-sport' : '';
            nav.innerHTML += `<button class="cat-btn ${cls}" onclick="filterProducts('${cat}', this)">${cat}</button>`;
        });
    }

    function displayProducts(filter = 'الكل') {
        const container = document.getElementById('products-container');
        container.innerHTML = "";
        const filtered = filter === 'الكل' ? allProducts : allProducts.filter(p => p.cat === filter);
        filtered.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/150'">
                    <h3 style="font-size:13px; margin:5px 0;">${p.name}</h3>
                    <div class="product-desc">${p.desc}</div>
                    <div class="price">${p.price.toLocaleString()} ر.ي</div>
                    <button class="btn-add" style="background:${p.cat==='ملابس رياضية'?'#0056b3':''}" onclick="addToCart('${p.id}')">أضف للسلة 🛒</button>
                </div>`;
        });
    }

    function filterProducts(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayProducts(cat);
    }

    function addToCart(productId) {
        const item = allProducts.find(p => p.id === productId);
        cart.push({...item, cartId: Date.now() + Math.random()});
        updateCartUI();
        showToast();
    }

    function removeFromCart(cartId) {
        cart = cart.filter(item => item.cartId !== cartId);
        updateCartUI();
    }

    function updateCartUI() {
        const cartBox = document.getElementById('cart-box');
        const list = document.getElementById('cart-list');
        const totalSpan = document.getElementById('cart-total');
        const deliveryCost = parseInt(document.getElementById('delivery-type').value);
        
        if (cart.length > 0) {
            cartBox.style.display = 'block';
            list.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <div>
                        <span style="font-weight:bold; margin-left:10px;">${item.price.toLocaleString()}</span>
                        <button style="border:none; background:none; color:red; cursor:pointer;" onclick="removeFromCart(${item.cartId})">❌</button>
                    </div>
                </div>
            `).join('');
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = (subtotal + deliveryCost).toLocaleString();
        } else {
            cartBox.style.display = 'none';
        }
    }

    function closeCart() { document.getElementById('cart-box').style.display = 'none'; }
    function showToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(() => { x.className = ""; }, 3000);
    }

    function sendOrder() {
        const name = document.getElementById('cust-name').value;
        const address = document.getElementById('cust-address').value;
        const deliveryType = document.getElementById('delivery-type').options[document.getElementById('delivery-type').selectedIndex].text;
        const deliveryCost = parseInt(document.getElementById('delivery-type').value);
        const payment = document.getElementById('payment-method').value;

        if (!name || !address) { alert("أدخل بياناتك لخدمتك!"); return; }

        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        let msg = `*طلب جديد - متجر الأحقاف* 🛒\n\n👤 *الزبون:* ${name}\n📍 *العنوان:* ${address}\n--------------------------\n`;
        cart.forEach((item, index) => { msg += `${index + 1}. ${item.name} (${item.id})\n`; });
        msg += `--------------------------\n🚚 *التوصيل:* ${deliveryType}\n💳 *طريقة الدفع:* ${payment}\n💰 *الإجمالي: ${(subtotal + deliveryCost).toLocaleString()} ر.ي*`;
        window.open(`https://wa.me/967778900391?text=${encodeURIComponent(msg)}`, '_blank');
    }

    loadProducts();
</script>
</body>
</html>
