<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <title>متجر الأحقاف 🇾🇪</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #fcfcfc; margin: 0; padding: 0; }
        
        /* الهيدر */
        .header { background-color: #5E0B15; color: #FFD700; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #B8860B; position: sticky; top: 0; z-index: 1000; }
        
        /* تصميم "الشعار النصي" بالخط الملكي */
        .logo-text { font-family: 'Amiri', serif; font-size: 40px; color: #FFD700; text-shadow: 2px 2px 0px #8B4513, 4px 4px 0px rgba(0,0,0,0.2); margin: 0; line-height: 1; }
        .sub-text { font-size: 14px; color: #F5DEB3; margin: 5px 0 0 0; font-family: Tahoma, sans-serif; }
        
        .cart-info { background-color: #ffffff; color: #5E0B15; padding: 10px 15px; border-radius: 8px; font-weight: bold; text-align: center; border: 2px solid #B8860B; }
        
        .products-grid { display: flex; flex-wrap: wrap; gap: 20px; padding: 30px; justify-content: center; max-width: 1200px; margin: 0 auto; }
        
        .card { background: white; border-radius: 12px; width: 220px; padding: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #B8860B; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        
        .price { color: #5E0B15; font-weight: bold; font-size: 20px; margin: 10px 0; }
        .btn { background-color: #5E0B15; color: #ffffff; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 class="logo-text">متجر الأحقاف</h1>
        <p class="sub-text">🇾🇪 فخامة التسوق في متناول يدك</p>
    </div>
    <div class="cart-info">
        🛍️ السلة: <span id="cart-count">0</span> | <span id="cart-total">0</span> ر.ي
        <button class="whatsapp-btn" onclick="sendOrder()">طلب عبر واتساب 💬</button>
    </div>
</div>

<div class="products-grid" id="products-container"></div>

<script>
    const products = [
        { name: "عطر الأحقاف الملكي", price: 25000, image: "perfume.jpg", cat: "عطور" },
        { name: "ساعة كلاسيك ذهبية", price: 35000, image: "watch.jpg", cat: "ساعات" },
        { name: "هاتف ذكي حديث", price: 150000, image: "phone.jpg", cat: "إلكترونيات" },
    ];

    const container = document.getElementById('products-container');
    let count = 0; let total = 0;

    function displayProducts() {
        container.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.image}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price">${p.price.toLocaleString()} ر.ي</div>
                <button class="btn" onclick="addToCart(${p.price})">أضف للسلة</button>
            </div>
        `).join('');
    }

    function addToCart(price) {
        count++; total += price;
        document.getElementById('cart-count').innerText = count;
        document.getElementById('cart-total').innerText = total.toLocaleString();
    }

    function sendOrder() {
        if (total === 0) { alert("السلة فارغة!"); return; }
        let msg = `مرحباً متجر الأحقاف، أريد طلب منتجات من المتجر.\nالإجمالي: ${total.toLocaleString()} ريال يمني.`;
        let myNumber = "967778900391"; // لا تنسَ وضع رقمك هنا
        window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    displayProducts();
</script>

</body>
</html>
