<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <title>متجر الأحقاف 🇾🇪</title>
    <style>
        :root { --main-color: #5E0B15; --gold-color: #D4AF37; --light-gold: #FFD700; --sport-color: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; padding-bottom: 120px; }
        
        /* شريط الإعلانات المتحرك */
        .announcement-bar {
            background: linear-gradient(90deg, var(--gold-color), var(--light-gold), var(--gold-color));
            color: var(--main-color);
            padding: 8px 0;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .scrolling-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        /* الهيدر المحدث مع مراعاة الشريط العلوي */
        .header { 
            background: linear-gradient(135deg, var(--main-color), #3e070e); 
            color: var(--light-gold); 
            padding: 20px 10px; 
            text-align: center; 
            border-bottom: 4px solid var(--gold-color); 
            position: sticky; 
            top: 35px; /* ينزل تحت شريط الإعلانات */
            z-index: 1000; 
        }
        .logo-text { font-family: 'Amiri', serif; font-size: 32px; margin: 0; display: block; }
        .tagline { font-size: 12px; color: var(--light-gold); opacity: 0.9; margin-top: 5px; }
        
        /* التنقل بين الأقسام */
        .category-nav { 
            background: white; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            overflow-x: auto; 
            border-bottom: 1px solid #ddd; 
            position: sticky; 
            top: 115px; 
            z-index: 999; 
        }
        .cat-btn { background: #fdf2f2; border: 1px solid var(--main-color); color: var(--main-color); padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 14px; }
        .cat-btn.active { background: var(--main-color); color: var(--light-gold); }
        .cat-btn-sport.active { background: var(--sport-color) !important; color: white; border-color: var(--sport-color); }

        /* شبكة المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; max-width: 1200px; margin: 20px auto 0 auto; }
        .card { position: relative; background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #eee; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        
        /* الملصقات (Badges) */
        .badge { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 5px; color: white; font-size: 10px; font-weight: bold; z-index: 5; }
        .badge-new { background: #28a745; }
        .badge-discount { background: #dc3545; }

        .product-desc { font-size: 11px; color: #777; margin: 5px 0; background: #f9f9f9; padding: 3px; border-radius: 4px; min-height: 15px; }
        .price { color: var(--main-color); font-weight: bold; font-size: 17px; margin: 8px 0; }
        .btn-add { background: var(--main-color); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* السلة */
        .cart-container { position: fixed; bottom: 0; width: 100%; background: white; border-top: 3px solid var(--gold-color); box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 2000; padding: 10px; display: none; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 14px; }
        
        .checkout-form { background: #fdf2f2; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; }
        .checkout-form label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--main-color); }
        .checkout-form input, .checkout-form select { width: 95%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; }

        .final-price { font-size: 20px; font-weight: bold; color: var(--main-color); text-align: center; margin: 10px 0; }
        .btn-send { background: #25D366; color: white; border: none; padding: 15px; border-radius: 35px; font-weight: bold; cursor: pointer; width: 100%; font-size: 17px; }

        #loading { text-align: center; padding: 100px 20px; font-weight: bold; color: var(--main-color); }
        #toast { visibility: hidden; background: #333; color: #fff; text-align: center; border-radius: 30px; padding: 10px 20px; position: fixed; z-index: 3000; left: 50%; transform: translateX(-50%); bottom: 150px; }
        #toast.show { visibility: visible; animation: f-in 0.5s, f-out 0.5s 2.5s; }
        @keyframes f-in { from {bottom: 130px; opacity: 0;} to {bottom: 150px; opacity: 1;} }
        @keyframes f-out { from {bottom: 150px; opacity: 1;} to {bottom: 130px; opacity: 0;} }
    </style>
</head>
<body>

<div class="announcement-bar">
    <div class="scrolling-text">
        🔥 تخفيضات كبرى بمناسبة الافتتاح في متجر الأحقاف.. اطلب الآن وتوصيل مجاني لأول 10 طلبات! 🔥 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 🕒 عرض محدود لفترة وجيزة.. تسوق الآن واستمتع بأفضل الأسعار! 🕒
    </div>
</div>

<div id="toast">تمت الإضافة للسلة 🛒</div>

<div class="header">
    <h1 class="logo-text">متجر الأحقاف</h1>
    <div class="tagline">الفخامة والجودة بين يديك 🇾🇪</div>
</div>
