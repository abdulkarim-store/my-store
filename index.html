<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <title>متجر الأحقاف 🇾🇪</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #fcfcfc; margin: 0; padding: 0; }
        .header { background-color: #5E0B15; color: #FFD700; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #B8860B; position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-family: 'Amiri', serif; font-size: 35px; color: #FFD700; text-shadow: 2px 2px 0px #8B4513; margin: 0; line-height: 1; }
        
        /* شريط الأقسام المطور */
        .category-nav { background: #fff; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #ddd; position: sticky; top: 85px; z-index: 999; overflow-x: auto; white-space: nowrap; }
        .cat-btn { background: #f4e8e8; border: 1px solid #5E0B15; color: #5E0B15; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: #5E0B15; color: #FFD700; }

        .cart-info { background-color: #ffffff; color: #5E0B15; padding: 8px 12px; border-radius: 8px; font-weight: bold; border: 2px solid #B8860B; }
        .products-grid { display: flex; flex-wrap: wrap; gap: 20px; padding: 30px; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; width: 220px; padding: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .price { color: #5E0B15; font-weight: bold; font-size: 20px; margin: 10px 0; }
        .btn { background-color: #5E0B15; color: #ffffff; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .whatsapp-btn { background-color: #25D366; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div><h1 class="logo-text">متجر الأحقاف</h1></div>
    <div class="cart-info">
        🛍️ <span id="cart-total">0</span> ر.ي
        <button class="whatsapp-btn" onclick="sendOrder()">طلب واتساب 💬</button>
    </div>
</div>

<div class="category-nav">
    <button class="cat-btn active" onclick="filterProducts('الكل', this)">الكل</button>
    <button class="cat-btn" onclick="filterProducts('عطور', this)">عطور</button>
    <button class="cat-btn" onclick="filterProducts('ساعات', this)">ساعات</button>
    <button class="cat-btn" onclick="filterProducts('إلكترونيات', this)">إلكترونيات</button>
    <button class="cat-btn" onclick="filterProducts('ملابس', this)">ملابس</button>
    <button class="cat-btn" onclick="filterProducts('أدوات منزلية', this)">أدوات منزلية</button>
</div>

<div class="products-grid" id="products-container"></div>

<script>
    const products = [
        // قسم العطور
        { name: "عطر الأحقاف الملكي", price: 25000, image: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=400", cat: "عطور" },
        // قسم الساعات
        { name: "ساعة كلاسيك ذهبية", price: 35000, image: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400", cat: "ساعات" },
        // قسم الإلكترونيات
        { name: "هاتف ذكي حديث", price: 150000, image: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400", cat: "إلكترونيات" },
        // قسم الملابس (جديد)
        { name: "طقم رجالي فاخر", price: 45000, image: "https://images.unsplash.com/photo-1594932224828-b4b059b6ffec?w=400", cat: "ملابس" },
        // قسم الأدوات المنزلية (جديد)
        { name: "طقم أواني سيراميك", price: 60000, image: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=400", cat: "أدوات منزلية" }
    ];

    const container = document.getElementById('products-container');
    let total = 0;

    function displayProducts(filter = 'الكل') {
        container.innerHTML = "";
        const filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);
        filtered.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toLocaleString()} ر.ي</div>
                    <button class="btn" onclick="addToCart(${p.price})">أضف للسلة</button>
                </div>`;
        });
    }

    function filterProducts(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayProducts(cat);
    }

    function addToCart(price) {
        total += price;
        document.getElementById('cart-total').innerText = total.toLocaleString();
    }

    function sendOrder() {
        if (total === 0) { alert("السلة فارغة!"); return; }
        let myNumber = "967778900391"; // ضـع رقمـك هنا (هام جداً)
        let msg = `مرحباً متجر الأحقاف 🛒\nأريد طلب منتجات من المتجر.\nالإجمالي: ${total.toLocaleString()} ريال يمني.`;
        window.open(`https://wa.me/${myNumber}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    displayProducts();
</script>

</body>
</html>
