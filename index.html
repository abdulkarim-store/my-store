<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <title>متجر الأحقاف 🇾🇪</title>
    <style>
        :root { --main-color: #5E0B15; --gold-color: #D4AF37; --light-gold: #FFD700; --sport-color: #0056b3; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        
        .header { background: linear-gradient(135deg, var(--main-color), #3e070e); color: var(--light-gold); padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--gold-color); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-family: 'Amiri', serif; font-size: 38px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0; }
        
        .category-nav { background: white; padding: 12px; display: flex; justify-content: center; gap: 10px; overflow-x: auto; border-bottom: 1px solid #ddd; position: sticky; top: 95px; z-index: 999; }
        .cat-btn { background: #fdf2f2; border: 1px solid var(--main-color); color: var(--main-color); padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .cat-btn.active { background: var(--main-color); color: var(--light-gold); }
        
        /* لون خاص لقسم الرياضة */
        .cat-btn-sport.active { background: var(--sport-color) !important; border-color: var(--sport-color); color: white; }

        .cart-status { background: white; color: var(--main-color); padding: 8px 15px; border-radius: 10px; font-weight: bold; border: 2px solid var(--gold-color); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 6px 12px rgba(0,0,0,0.08); border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold-color); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        
        /* تنسيق الوصف الجديد */
        .product-desc { font-size: 13px; color: #666; margin: 5px 0 10px 0; background: #f1f1f1; padding: 4px; border-radius: 5px; }
        
        .price { color: var(--main-color); font-weight: bold; font-size: 22px; margin-bottom: 15px; }
        .btn { background: var(--main-color); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .whatsapp-float { position: fixed; bottom: 20px; left: 20px; background: #25D366; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 1001; cursor: pointer; border: 2px solid white; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 1002; right: 30px; bottom: 30px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">تمت الإضافة للسلة 🛒</div>

<div class="header">
    <h1 class="logo-text">متجر الأحقاف</h1>
    <div class="cart-status">🛍️ <span id="cart-total">0</span> ر.ي</div>
</div>

<div class="category-nav" id="cat-nav"></div>
<div class="products-grid" id="products-container"></div>

<div class="whatsapp-float" onclick="sendOrder()">إرسال الطلب (واتساب) 💬</div>

<script>
    const products = [
        // قسم الساعات الولادي (مع وصف الضمان)
        { id: "BW-01", name: "ساعة ولادي موديل 1", price: 12000, image: "watch_boy1.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },
        { id: "BW-02", name: "ساعة ولادي موديل 2", price: 12000, image: "watch_boy2.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },
        { id: "BW-03", name: "ساعة ولادي موديل 3", price: 12000, image: "watch_boy3.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },
        { id: "BW-04", name: "ساعة ولادي موديل 4", price: 12000, image: "watch_boy4.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },
        { id: "BW-05", name: "ساعة ولادي موديل 5", price: 12000, image: "watch_boy5.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },
        { id: "BW-06", name: "ساعة ولادي موديل 6", price: 12000, image: "watch_boy6.jpg.jpg", cat: "ساعات ولادي", desc: "ضد الماء - ضمان سنة" },

        // قسم الملابس الرياضية (مع وصف القماش والمقاس)
        { id: "SP-01", name: "طقم رياضي موديل 1", price: 10000, image: "sport_1.jpg.jpg", cat: "ملابس رياضية", desc: "خامة ممتازة - متوفر بجميع المقاسات" },
        { id: "SP-02", name: "طقم رياضي موديل 2", price: 10000, image: "sport_2.jpg.jpg", cat: "ملابس رياضية", desc: "خامة ممتازة - متوفر بجميع المقاسات" },
        { id: "SP-03", name: "طقم رياضي موديل 3", price: 10000, image: "sport_3.jpg.jpg", cat: "ملابس رياضية", desc: "خامة ممتازة - متوفر بجميع المقاسات" },
        { id: "SP-04", name: "طقم رياضي موديل 4", price: 10000, image: "sport_4.jpg.jpg", cat: "ملابس رياضية", desc: "خامة ممتازة - متوفر بجميع المقاسات" },
        { id: "SP-05", name: "طقم رياضي موديل 5", price: 10000, image: "sport_5.jpg.jpg", cat: "ملابس رياضية", desc: "خامة ممتازة - متوفر بجميع المقاسات" }
    ];

    let cart = [];
    const container = document.getElementById('products-container');

    function displayProducts(filter = 'الكل') {
        container.innerHTML = "";
        const filtered = filter === 'الكل' ? products : products.filter(p => p.cat === filter);
        filtered.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.image}" alt="${p.name}">
                    <h3 style="margin-bottom:2px">${p.name}</h3>
                    <div class="product-desc">${p.desc}</div>
                    <div class="price">${p.price.toLocaleString()} ر.ي</div>
                    <button class="btn" style="background:${p.cat==='ملابس رياضية'?'#0056b3':''}" onclick="addToCart('${p.id}')">أضف للسلة</button>
                </div>`;
        });
    }

    const categories = ['الكل', ...new Set(products.map(p => p.cat))];
    const nav = document.getElementById('cat-nav');
    categories.forEach(cat => {
        let extraClass = (cat === 'ملابس رياضية') ? 'cat-btn-sport' : '';
        nav.innerHTML += `<button class="cat-btn ${cat==='الكل'?'active':''} ${extraClass}" onclick="filterProducts('${cat}', this)">${cat}</button>`;
    });

    function filterProducts(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayProducts(cat);
    }

    function addToCart(productId) {
        const item = products.find(p => p.id === productId);
        cart.push(item);
        document.getElementById('cart-total').innerText = cart.reduce((s, i) => s + i.price, 0).toLocaleString();
        showToast();
    }

    function showToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    function sendOrder() {
        if (cart.length === 0) { alert("السلة فارغة!"); return; }
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        let msg = `*طلب جديد - متجر الأحقاف* 🛒\n\n`;
        cart.forEach((item, index) => {
            msg += `${index + 1}. ${item.name} (${item.id}) - ${item.price.toLocaleString()} ر.ي\n`;
        });
        msg += `\n💰 *الإجمالي: ${total.toLocaleString()} ر.ي*\n`;
        msg += `\nرابط المتجر: ${window.location.href}`;
        window.open(`https://wa.me/967778900391?text=${encodeURIComponent(msg)}`, '_blank');
    }

    displayProducts();
</script>
</body>
</html>
